<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POPDOG 🐶</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #fff8e7;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Fredoka One', cursive;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image: radial-gradient(circle, #f0d090 1.5px, transparent 1.5px);
  background-size: 30px 30px;
  pointer-events:none;
  z-index:0;
}

h1 {
  font-family: 'Bangers', cursive;
  font-size: clamp(3rem,10vw,6rem);
  letter-spacing: 6px;
  color: #1a0a00;
  text-shadow: 4px 4px 0 #ff6b35, 7px 7px 0 #ffd166;
  position: relative;
  z-index: 1;
  animation: tbounce 2s ease-in-out infinite;
}

@keyframes tbounce {
  0%,100%{ transform:translateY(0) }
  50%{ transform:translateY(-8px) }
}

.sub {
  color: #b05020;
  font-size: clamp(0.7rem,2vw,1rem);
  letter-spacing: 2px;
  margin: 6px 0 20px;
  position: relative;
  z-index: 1;
  text-align:center;
  padding: 0 10px;
}

/* Dog */
#dog {
  position: relative;
  z-index: 2;
  width: 240px;
  height: 240px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  filter: drop-shadow(0 18px 28px rgba(0,0,0,0.20));
}

#dog.pop { animation: dogPop 0.22s ease; }
@keyframes dogPop {
  0%  { transform:scale(1) }
  35% { transform:scale(0.87) translateY(6px) }
  70% { transform:scale(1.07) translateY(-5px) }
  100%{ transform:scale(1) }
}

.m-closed { display:block }
.m-open   { display:none  }
.is-open .m-closed { display:none  }
.is-open .m-open   { display:block }

.e-normal { display:block }
.e-squint { display:none  }
.is-open .e-normal { display:none  }
.is-open .e-squint { display:block }

/* Counter */
#counter-wrap {
  position:relative;
  z-index:1;
  margin-top:22px;
  text-align:center;
}
#count {
  font-family:'Bangers',cursive;
  font-size: clamp(2.5rem,8vw,4.5rem);
  letter-spacing:4px;
  color:#1a0a00;
  line-height:1;
}
#count-label {
  font-size:0.85rem;
  color:#b05020;
  letter-spacing:2px;
  margin-top:2px;
}

/* Country badge */
#badge {
  position:relative;
  z-index:1;
  margin-top:16px;
  background:#1a0a00;
  color:#ffd166;
  border-radius:50px;
  padding:8px 22px;
  font-size:0.95rem;
  letter-spacing:1px;
  display:flex;
  align-items:center;
  gap:10px;
  box-shadow:4px 4px 0 #ff6b35;
}
#badge-flag { font-size:1.4rem; }

/* Particles */
.particle {
  position:fixed;
  pointer-events:none;
  font-size:1.4rem;
  z-index:999;
  animation: floatUp 0.85s ease forwards;
}
@keyframes floatUp {
  0%  { opacity:1; transform:translateY(0) scale(1) rotate(0deg) }
  100%{ opacity:0; transform:translateY(-110px) scale(0.3) rotate(50deg) }
}

/* Feed */
#feed {
  position:fixed;
  bottom:16px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  flex-direction:column-reverse;
  gap:5px;
  z-index:10;
  pointer-events:none;
  width:300px;
}
.feed-item {
  background:rgba(26,10,0,0.88);
  color:#fff;
  border-radius:30px;
  padding:5px 14px;
  font-size:0.78rem;
  letter-spacing:0.5px;
  display:flex;
  align-items:center;
  gap:8px;
  animation: slideUp 0.3s ease, fadeOut 3s 0.4s ease forwards;
}
@keyframes slideUp {
  from{ opacity:0; transform:translateY(16px) }
  to  { opacity:1; transform:translateY(0) }
}
@keyframes fadeOut {
  to{ opacity:0; transform:translateY(-8px) }
}

/* bg paw prints */
.bg-paw {
  position:fixed;
  font-size:2.5rem;
  opacity:0.07;
  pointer-events:none;
  z-index:0;
  animation:spin 12s linear infinite;
}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
</style>
</head>
<body>

<span class="bg-paw" style="top:6%;left:6%">🐾</span>
<span class="bg-paw" style="top:8%;right:8%;animation-direction:reverse;animation-duration:9s">🐾</span>
<span class="bg-paw" style="bottom:14%;left:9%;animation-duration:15s">🐾</span>
<span class="bg-paw" style="bottom:6%;right:6%;animation-direction:reverse;animation-duration:11s">🐾</span>

<h1>POPDOG</h1>
<p class="sub">🐾 EVERY CLICK COUNTS FROM YOUR COUNTRY 🐾</p>

<!-- DOG -->
<div id="dog">
<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="240" height="240">
  <!-- Ears -->
  <ellipse cx="52" cy="72" rx="28" ry="38" fill="#c8833a" transform="rotate(-18 52 72)"/>
  <ellipse cx="148" cy="72" rx="28" ry="38" fill="#c8833a" transform="rotate(18 148 72)"/>
  <ellipse cx="52" cy="74" rx="17" ry="26" fill="#e8a060" transform="rotate(-18 52 74)"/>
  <ellipse cx="148" cy="74" rx="17" ry="26" fill="#e8a060" transform="rotate(18 148 74)"/>
  <!-- Head -->
  <ellipse cx="100" cy="108" rx="72" ry="68" fill="#d4914a"/>
  <ellipse cx="100" cy="82" rx="38" ry="22" fill="#e8a868" opacity="0.45"/>
  <!-- Eye whites -->
  <ellipse cx="76" cy="98" rx="18" ry="20" fill="#fff"/>
  <ellipse cx="124" cy="98" rx="18" ry="20" fill="#fff"/>
  <!-- Normal eyes -->
  <g class="e-normal">
    <circle cx="76" cy="100" r="11" fill="#3d2000"/>
    <circle cx="124" cy="100" r="11" fill="#3d2000"/>
    <circle cx="80" cy="96" r="4" fill="#fff"/>
    <circle cx="128" cy="96" r="4" fill="#fff"/>
  </g>
  <!-- Squint eyes -->
  <g class="e-squint">
    <path d="M62 100 Q76 88 90 100" stroke="#3d2000" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M110 100 Q124 88 138 100" stroke="#3d2000" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Snout -->
  <ellipse cx="100" cy="128" rx="32" ry="24" fill="#e8a060"/>
  <!-- Nose -->
  <ellipse cx="100" cy="118" rx="13" ry="9" fill="#2a1000"/>
  <ellipse cx="96" cy="115" rx="4" ry="3" fill="#5a3020" opacity="0.5"/>
  <!-- Closed mouth -->
  <g class="m-closed">
    <path d="M84 136 Q100 148 116 136" stroke="#a05028" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Open mouth -->
  <g class="m-open">
    <path d="M82 134 Q100 162 118 134" fill="#8B1A1A"/>
    <path d="M82 134 Q100 162 118 134" stroke="#a05028" stroke-width="3" fill="none" stroke-linecap="round"/>
    <ellipse cx="100" cy="154" rx="14" ry="11" fill="#ff6b8a"/>
    <path d="M86 150 Q100 168 114 150" fill="#ff4d6d"/>
    <rect x="88" y="134" width="10" height="9" rx="2" fill="#fff"/>
    <rect x="102" y="134" width="10" height="9" rx="2" fill="#fff"/>
  </g>
  <!-- Eyebrows -->
  <path d="M60 82 Q76 76 90 82" stroke="#8B4513" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M110 82 Q124 76 140 82" stroke="#8B4513" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Blush -->
  <ellipse cx="60" cy="118" rx="14" ry="10" fill="#ff9080" opacity="0.28"/>
  <ellipse cx="140" cy="118" rx="14" ry="10" fill="#ff9080" opacity="0.28"/>
</svg>
</div>

<div id="counter-wrap">
  <div id="count">0</div>
  <div id="count-label">TOTAL POPS 🐾</div>
</div>

<div id="badge">
  <span id="badge-flag">🌍</span>
  <span id="badge-name">Detecting country…</span>
</div>

<div id="feed"></div>

<script>
(function(){
  var total = 0;
  var cName = 'Unknown';
  var cFlag = '🌍';
  var popTmr = null;
  var audioCtx = null;

  var dog  = document.getElementById('dog');
  var cntEl = document.getElementById('count');
  var bFlag = document.getElementById('badge-flag');
  var bName = document.getElementById('badge-name');
  var feed  = document.getElementById('feed');

  // Audio
  function getAudio() {
    if (audioCtx) return audioCtx;
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
    return audioCtx;
  }

  function playPop() {
    var ctx = getAudio();
    if (!ctx) return;
    try {
      var now = ctx.currentTime;
      var sr  = ctx.sampleRate;
      var len = Math.floor(sr * 0.09);
      var buf = ctx.createBuffer(1, len, sr);
      var d   = buf.getChannelData(0);
      for (var i=0;i<len;i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/len,2.5);

      var noise = ctx.createBufferSource();
      noise.buffer = buf;

      var bp = ctx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 1200;
      bp.Q.value = 0.8;

      var ng = ctx.createGain();
      ng.gain.setValueAtTime(1.0, now);
      ng.gain.exponentialRampToValueAtTime(0.001, now+0.08);

      noise.connect(bp); bp.connect(ng); ng.connect(ctx.destination);
      noise.start(now); noise.stop(now+0.09);

      var osc = ctx.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(600, now);
      osc.frequency.exponentialRampToValueAtTime(170, now+0.11);

      var og = ctx.createGain();
      og.gain.setValueAtTime(0.30, now);
      og.gain.exponentialRampToValueAtTime(0.001, now+0.13);

      osc.connect(og); og.connect(ctx.destination);
      osc.start(now); osc.stop(now+0.14);
    } catch(e){}
  }

  // Flag
  function toFlag(code) {
    if (!code || code.length!==2) return '🌍';
    code = code.toUpperCase();
    return String.fromCodePoint(0x1F1E6+code.charCodeAt(0)-65)+
           String.fromCodePoint(0x1F1E6+code.charCodeAt(1)-65);
  }

  // Detect country
  fetch('https://ipapi.co/json/')
    .then(function(r){return r.json();})
    .then(function(d){
      cName = d.country_name || 'Unknown';
      cFlag = toFlag(d.country_code);
      bFlag.textContent = cFlag;
      bName.textContent = cName;
    })
    .catch(function(){
      bName.textContent = 'Unknown Country';
    });

  // Particles
  var emojis=['🐾','💥','⭐','✨','🦴','💛','🐶','❤️'];
  function spawnParticles(x,y) {
    for(var i=0;i<5;i++){
      (function(){
        var p=document.createElement('div');
        p.className='particle';
        p.textContent=emojis[Math.floor(Math.random()*emojis.length)];
        p.style.left=(x+(Math.random()*80-40))+'px';
        p.style.top =(y-20+(Math.random()*40-20))+'px';
        document.body.appendChild(p);
        setTimeout(function(){if(p.parentNode)p.parentNode.removeChild(p);},900);
      })();
    }
  }

  // Feed
  function addFeed() {
    var item=document.createElement('div');
    item.className='feed-item';
    item.innerHTML='<span>'+cFlag+'</span><span>'+cName+' popped! 🐾</span>';
    if(feed.firstChild) feed.insertBefore(item,feed.firstChild);
    else feed.appendChild(item);
    while(feed.children.length>4) feed.removeChild(feed.lastChild);
    setTimeout(function(){if(item.parentNode)item.parentNode.removeChild(item);},3800);
  }

  // Pop logic
  function doPop(x,y) {
    total++;
    cntEl.textContent=total.toLocaleString();
    playPop();

    dog.classList.add('is-open');
    dog.classList.remove('pop');
    void dog.offsetWidth;
    dog.classList.add('pop');

    clearTimeout(popTmr);
    popTmr=setTimeout(function(){dog.classList.remove('is-open');},200);

    spawnParticles(x,y);
    if(total%3===0) addFeed();
  }

  // Events
  dog.addEventListener('click',function(e){
    e.preventDefault();
    var r=dog.getBoundingClientRect();
    doPop(r.left+r.width/2, r.top+r.height/2);
  });

  document.addEventListener('keydown',function(e){
    if(e.code==='Space'||e.key===' '){
      e.preventDefault();
      var r=dog.getBoundingClientRect();
      doPop(r.left+r.width/2, r.top+r.height/2);
    }
  });
})();
</script>
</body>
</html>
