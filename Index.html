<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROCKDOG 🎸</title>
<link href="https://fonts.googleapis.com/css2?family=Metal+Mania&family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#080808;
  --yellow:#FFE000;
  --red:#FF1A1A;
  --orange:#FF6600;
  --card:#111;
}

body{
  background:var(--bg);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;
  padding:20px 16px 100px;
  font-family:'Oswald',sans-serif;
  overflow-x:hidden;
  user-select:none;-webkit-user-select:none;
}

/* stage spotlight */
body::before{
  content:"";
  position:fixed;inset:0;
  background:radial-gradient(ellipse 60% 50% at 50% 20%, rgba(255,100,0,0.07) 0%, transparent 70%);
  pointer-events:none;z-index:0;
}

/* scanlines */
body::after{
  content:"";
  position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.12) 3px,rgba(0,0,0,0.12) 4px);
  pointer-events:none;z-index:0;
}

/* ── TITLE ── */
.title-wrap{position:relative;z-index:1;text-align:center;margin-bottom:10px}

h1{
  font-family:'Metal Mania',cursive;
  font-size:clamp(3rem,13vw,6.5rem);
  letter-spacing:6px;
  background:linear-gradient(180deg,#fff 0%,var(--yellow) 40%,var(--orange) 70%,var(--red) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 20px rgba(255,150,0,0.7)) drop-shadow(0 4px 0 rgba(180,0,0,0.8));
  line-height:1;
  animation:titleFlicker 4s ease-in-out infinite;
}
@keyframes titleFlicker{
  0%,100%{filter:drop-shadow(0 0 20px rgba(255,150,0,0.7)) drop-shadow(0 4px 0 rgba(180,0,0,0.8))}
  92%{filter:drop-shadow(0 0 20px rgba(255,150,0,0.7)) drop-shadow(0 4px 0 rgba(180,0,0,0.8))}
  93%{filter:drop-shadow(0 0 4px rgba(255,150,0,0.3)) drop-shadow(0 4px 0 rgba(180,0,0,0.8))}
  94%{filter:drop-shadow(0 0 20px rgba(255,150,0,0.7)) drop-shadow(0 4px 0 rgba(180,0,0,0.8))}
  97%{filter:drop-shadow(0 0 20px rgba(255,150,0,0.7)) drop-shadow(0 4px 0 rgba(180,0,0,0.8))}
  98%{filter:drop-shadow(0 0 4px rgba(255,150,0,0.2)) drop-shadow(0 4px 0 rgba(180,0,0,0.8))}
  99%{filter:drop-shadow(0 0 20px rgba(255,150,0,0.7)) drop-shadow(0 4px 0 rgba(180,0,0,0.8))}
}

/* lightning separators in title */
.title-deco{
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin-top:4px;
}
.title-deco span{color:#555;font-size:0.65rem;letter-spacing:4px;font-family:'Oswald',sans-serif}
.bolt{color:var(--yellow);font-size:1rem;animation:boltFlash 1.5s ease-in-out infinite}
@keyframes boltFlash{0%,100%{opacity:1}50%{opacity:0.3}}

/* ── GLOBAL COUNTER ── */
.global-box{
  position:relative;z-index:1;
  margin:10px 0;
  background:#0e0e0e;
  border:1px solid #222;
  border-top:2px solid var(--yellow);
  border-radius:8px;
  padding:10px 36px;
  text-align:center;
  box-shadow:0 0 40px rgba(255,200,0,0.06),inset 0 1px 0 #222;
}
.global-label{display:block;font-size:0.62rem;color:#555;letter-spacing:4px;margin-bottom:4px}
#global-count{
  font-family:'Metal Mania',cursive;
  font-size:clamp(2rem,8vw,3.5rem);
  letter-spacing:4px;
  color:var(--yellow);
  line-height:1;
  text-shadow:0 0 20px rgba(255,220,0,0.5);
}
.global-sub{display:block;font-size:0.6rem;color:#444;letter-spacing:3px;margin-top:4px}

/* ── DOG STAGE ── */
#stage{
  position:relative;z-index:2;
  width:min(320px,88vw);
  margin:10px 0;
}

/* spotlight behind dog */
.spotlight{
  position:absolute;
  bottom:-10px;left:50%;transform:translateX(-50%);
  width:80%;height:30px;
  background:radial-gradient(ellipse, rgba(255,150,0,0.35) 0%, transparent 70%);
  border-radius:50%;
  pointer-events:none;
  animation:spotPulse 2s ease-in-out infinite;
}
@keyframes spotPulse{0%,100%{opacity:0.6}50%{opacity:1}}

/* dog image circle */
#dog-wrap{
  position:relative;
  width:100%;
  padding-bottom:100%;/* square */
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}

.dog-ring{
  position:absolute;inset:0;
  border-radius:50%;
  border:3px solid #1a1a1a;
  overflow:hidden;
  background:#111;
  transition:box-shadow 0.1s;
  box-shadow:
    0 0 0 4px #1a1a1a,
    0 0 30px rgba(255,150,0,0.12),
    0 0 80px rgba(255,0,0,0.06),
    0 20px 50px rgba(0,0,0,0.8);
}

#dog-wrap.popped .dog-ring{
  box-shadow:
    0 0 0 4px var(--yellow),
    0 0 50px rgba(255,220,0,0.7),
    0 0 100px rgba(255,100,0,0.4),
    0 20px 50px rgba(0,0,0,0.8);
}

#dog-img{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
}

/* ── ROCK OVERLAYS ── */

/* Rock SVG Glasses */
.glasses-svg{
  position:absolute;
  top:19%;left:50%;
  transform:translateX(-50%);
  width:82%;
  z-index:10;
  pointer-events:none;
  filter:drop-shadow(0 3px 8px rgba(0,0,0,1)) drop-shadow(0 0 12px rgba(255,220,0,0.4));
  animation:glassesWobble 3s ease-in-out infinite;
}
@keyframes glassesWobble{
  0%,100%{transform:translateX(-50%) rotate(-2deg) translateY(0)}
  50%{transform:translateX(-50%) rotate(2deg) translateY(-3px)}
}

/* Mouth cover – hides open mouth to simulate closed state */
#mouth-cover{
  position:absolute;
  left:16%;top:49%;
  width:68%;height:36%;
  background:
    radial-gradient(ellipse 55% 55% at 50% 25%,
      #f4ead8 0%,
      #eadcc0 35%,
      #dcc8a4 65%,
      rgba(200,180,140,0) 100%);
  border-radius:44% 44% 52% 52%;
  pointer-events:none;
  z-index:5;
  transition:opacity 0.06s;
}
/* closed mouth line */
#mouth-cover::after{
  content:"";
  position:absolute;
  bottom:28%;left:22%;right:22%;
  height:2px;
  border-radius:50%;
  background:rgba(140,90,40,0.25);
  box-shadow:0 1px 0 rgba(140,90,40,0.1);
}
/* open state */
#dog-wrap.mouth-open #mouth-cover{
  opacity:0;
}

/* Mohawk / spikes on top */
.spikes{
  position:absolute;
  top:-18%;left:50%;transform:translateX(-50%);
  display:flex;gap:4px;align-items:flex-end;
  z-index:9;pointer-events:none;
}
.spike{
  width:clamp(8px,2.5vw,12px);
  border-radius:2px 2px 0 0;
  background:linear-gradient(180deg,var(--red),var(--orange));
  box-shadow:0 0 8px rgba(255,100,0,0.8);
  animation:spikeWave 1.5s ease-in-out infinite;
}
.spike:nth-child(1){height:clamp(20px,6vw,34px);animation-delay:0s}
.spike:nth-child(2){height:clamp(32px,9vw,54px);animation-delay:0.1s}
.spike:nth-child(3){height:clamp(44px,13vw,74px);animation-delay:0.2s}
.spike:nth-child(4){height:clamp(32px,9vw,54px);animation-delay:0.3s}
.spike:nth-child(5){height:clamp(20px,6vw,34px);animation-delay:0.4s}
@keyframes spikeWave{
  0%,100%{transform:scaleY(1)}
  50%{transform:scaleY(1.12)}
}

/* Bandana */
.bandana{
  position:absolute;
  bottom:16%;left:50%;
  transform:translateX(-50%);
  font-size:clamp(1.8rem,6vw,2.8rem);
  z-index:10;pointer-events:none;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,0.8));
}

/* Guitar left side */
.guitar-l{
  position:absolute;
  left:-18%;top:40%;
  font-size:clamp(2rem,7vw,3.5rem);
  transform:rotate(-25deg);
  animation:guitarSway 3s ease-in-out infinite;
  z-index:8;pointer-events:none;
  filter:drop-shadow(0 0 10px rgba(255,200,0,0.4));
}
@keyframes guitarSway{
  0%,100%{transform:rotate(-25deg) translateY(0)}
  50%{transform:rotate(-20deg) translateY(-6px)}
}

/* Star + Lightning decorations */
.deco-item{
  position:absolute;
  pointer-events:none;
  animation:decoFloat 2.5s ease-in-out infinite;
  z-index:8;
}
@keyframes decoFloat{
  0%,100%{transform:translateY(0) scale(1)}
  50%{transform:translateY(-8px) scale(1.1)}
}

/* Flames bottom */
.flames{
  position:absolute;
  bottom:-5%;left:50%;
  transform:translateX(-50%);
  font-size:clamp(1.5rem,5vw,2.5rem);
  z-index:7;pointer-events:none;
  letter-spacing:4px;
  animation:flameFlicker 0.5s ease-in-out infinite alternate;
}
@keyframes flameFlicker{
  0%{transform:translateX(-50%) scaleY(1)}
  100%{transform:translateX(-50%) scaleY(1.1) scaleX(1.02)}
}

/* Bounce animation */
#dog-wrap.bounce{animation:dogBounce 0.22s ease;}
@keyframes dogBounce{
  0%{transform:scale(1) rotate(0deg)}
  30%{transform:scale(0.86) rotate(-4deg) translateY(8px)}
  65%{transform:scale(1.10) rotate(3deg) translateY(-8px)}
  100%{transform:scale(1) rotate(0deg)}
}

/* Ripple */
.ripple{
  position:absolute;inset:0;border-radius:50%;
  border:3px solid var(--yellow);
  animation:rippleOut 0.6s ease forwards;
  pointer-events:none;z-index:20;
}
@keyframes rippleOut{
  0%{transform:scale(1);opacity:0.9}
  100%{transform:scale(1.7);opacity:0}
}

/* ── MY COUNT ── */
.my-box{
  position:relative;z-index:1;
  display:flex;align-items:center;gap:16px;
  background:#0e0e0e;
  border:1px solid #1e1e1e;
  border-radius:50px;
  padding:8px 24px;
  margin-top:8px;margin-bottom:8px;
}
.my-label{font-size:0.62rem;color:#444;letter-spacing:3px}
#my-count{font-family:'Metal Mania',cursive;font-size:1.8rem;color:#fff;letter-spacing:2px}

/* ── COUNTRY BADGE ── */
#badge{
  position:relative;z-index:1;
  display:flex;align-items:center;gap:10px;
  background:#0e0e0e;
  border:1px solid #1e1e1e;
  border-left:3px solid var(--red);
  border-radius:50px;
  padding:8px 20px;margin-bottom:14px;
  font-size:0.85rem;color:#aaa;letter-spacing:1px;
}
#badge-flag{font-size:1.4rem}
#badge-name{font-size:0.82rem;letter-spacing:1px}
#badge-my-pops{
  margin-left:4px;background:var(--red);
  color:#fff;border-radius:20px;
  padding:2px 10px;font-size:0.65rem;letter-spacing:1px;
}

/* ── LEADERBOARD ── */
#leaderboard{
  position:relative;z-index:1;
  width:100%;max-width:380px;
  background:#0e0e0e;
  border:1px solid #1e1e1e;
  border-top:2px solid var(--red);
  border-radius:10px;overflow:hidden;
  margin-bottom:14px;
}
.lb-title{
  padding:9px 16px;font-size:0.65rem;color:#444;
  letter-spacing:3px;border-bottom:1px solid #1a1a1a;
  display:flex;align-items:center;gap:8px;
}
.lb-row{
  display:flex;align-items:center;gap:10px;
  padding:7px 16px;border-bottom:1px solid #141414;
  animation:lbSlide 0.3s ease;
}
.lb-row:last-child{border-bottom:none}
@keyframes lbSlide{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
.lb-rank{font-size:0.7rem;color:#333;width:20px;text-align:center}
.lb-flag{font-size:1.1rem}
.lb-cname{flex:1;font-size:0.75rem;color:#999;letter-spacing:1px}
.lb-bar-wrap{width:70px;height:4px;background:#1e1e1e;border-radius:2px;overflow:hidden}
.lb-bar{height:100%;background:linear-gradient(90deg,var(--red),var(--yellow));border-radius:2px;transition:width 0.5s ease}
.lb-num{font-family:'Metal Mania',cursive;font-size:0.9rem;color:var(--yellow);min-width:36px;text-align:right}

/* ── PARTICLES ── */
.particle{
  position:fixed;pointer-events:none;z-index:999;
  animation:floatUp 0.9s ease forwards;
}
@keyframes floatUp{
  0%{opacity:1;transform:translateY(0) scale(1) rotate(0deg)}
  100%{opacity:0;transform:translateY(-140px) scale(0.2) rotate(70deg)}
}

/* ── FEED ── */
#feed{
  position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column-reverse;gap:5px;
  z-index:10;pointer-events:none;width:300px;
}
.feed-item{
  background:rgba(8,8,8,0.96);
  border:1px solid #222;
  color:#999;border-radius:30px;
  padding:5px 16px;font-size:0.72rem;
  letter-spacing:0.5px;display:flex;align-items:center;gap:8px;
  animation:slideUp 0.3s ease, fadeOut 3s 0.4s ease forwards;
}
.feed-item .glow{color:var(--yellow)}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeOut{to{opacity:0;transform:translateY(-8px)}}

/* Guitar floater */
.guitar-float{
  position:fixed;pointer-events:none;font-size:2rem;z-index:998;
  animation:gPop 0.7s ease forwards;
}
@keyframes gPop{
  0%{opacity:1;transform:scale(0.5) translateY(0) rotate(-20deg)}
  40%{opacity:1;transform:scale(1.4) translateY(-30px) rotate(10deg)}
  100%{opacity:0;transform:scale(0.7) translateY(-90px) rotate(-30deg)}
}

/* screen shake on click */
@keyframes shake{
  0%,100%{transform:translate(0,0)}
  20%{transform:translate(-3px,2px)}
  40%{transform:translate(3px,-2px)}
  60%{transform:translate(-2px,3px)}
  80%{transform:translate(2px,-1px)}
}
body.shaking{animation:shake 0.18s ease}
</style>
</head>

</div>

        <path d="M71 16 L82 3 L97 16 L82 29 Z" fill="#111" stroke="#FFE000" stroke-width="2"/>
        <!-- Lens tint gradient left -->
        <path d="M13 16 L24 3 L39 16 L24 29 Z" fill="url(#tintL)" opacity="0.85"/>
        <!-- Lens tint gradient right -->
        <path d="M71 16 L82 3 L97 16 L82 29 Z" fill="url(#tintR)" opacity="0.85"/>
        <!-- Shine left -->
        <ellipse cx="20" cy="10" rx="4" ry="2.5" fill="rgba(255,255,255,0.22)" transform="rotate(-30 20 10)"/>
        <!-- Shine right -->
        <ellipse cx="78" cy="10" rx="4" ry="2.5" fill="rgba(255,255,255,0.22)" transform="rotate(-30 78 10)"/>
        <!-- Gold bolts on lenses -->
        <text x="20" y="22" font-size="9" fill="#FFE000" opacity="0.6" text-anchor="middle">⚡</text>
        <text x="82" y="22" font-size="9" fill="#FFE000" opacity="0.6" text-anchor="middle">⚡</text>
        <defs>
          <radialGradient id="tintL" cx="40%" cy="35%">
            <stop offset="0%" stop-color="#3a0080"/>
            <stop offset="100%" stop-color="#110022"/>
          </radialGradient>
          <radialGradient id="tintR" cx="40%" cy="35%">
            <stop offset="0%" stop-color="#3a0080"/>
            <stop offset="100%" stop-color="#110022"/>
          </radialGradient>
        </defs>
      </svg>
    </div>

    <!-- Guitar left -->
    <div class="guitar-l">🎸</div>

    <!-- Lightning bolts -->
    <div class="deco-item" style="top:5%;right:5%;font-size:clamp(1rem,3.5vw,1.8rem);animation-delay:0.3s">⚡</div>
    <div class="deco-item" style="top:15%;right:-5%;font-size:clamp(0.8rem,2.5vw,1.2rem);animation-delay:0.8s">🔥</div>
    <div class="deco-item" style="top:5%;left:8%;font-size:clamp(0.8rem,2.5vw,1.3rem);animation-delay:0.5s">⭐</div>
    <div class="deco-item" style="top:25%;left:-2%;font-size:clamp(0.7rem,2vw,1rem);animation-delay:1.1s">🤘</div>

    <!-- Flames -->
    <div class="flames">🔥🔥🔥</div>
  </div>
</div>

<!-- ── MY COUNT ── -->
<div class="my-box">
  <span class="my-label">YOUR POPS</span>
  <div id="my-count">0</div>
</div>

<!-- ── COUNTRY BADGE ── -->
<div id="badge">
  <span id="badge-flag">🌍</span>
  <span id="badge-name">Detecting…</span>
  <span id="badge-my-pops">0 pops</span>
</div>

<!-- ── LEADERBOARD ── -->
<div id="leaderboard">
  <div class="lb-title">🏆 COUNTRY LEADERBOARD</div>
  <div id="lb-rows"></div>
</div>

<!-- ── FEED ── -->
<div id="feed"></div>

<script>
(function(){
  var globalCount=0, myCount=0;
  var cName='Unknown', cFlag='🌍', cCode='XX';
  var audioCtx=null, popTmr=null;
  var NS='rockdog-v2';
  var LB_KEY='rockdog_lb_v2';
  var lb={};
  try{lb=JSON.parse(localStorage.getItem(LB_KEY)||'{}');}catch(e){}

  var dogWrap  =document.getElementById('dog-wrap');
  var globalEl =document.getElementById('global-count');
  var myEl     =document.getElementById('my-count');
  var bFlag    =document.getElementById('badge-flag');
  var bName    =document.getElementById('badge-name');
  var bPops    =document.getElementById('badge-my-pops');
  var lbRows   =document.getElementById('lb-rows');
  var feed     =document.getElementById('feed');

  // ── Audio: Rock Guitar + Bark ──────────────────────────
  function getCtx(){
    if(audioCtx) return audioCtx;
    try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
    return audioCtx;
  }

  function makeDistortion(ctx, amount){
    var curve=new Float32Array(256);
    for(var i=0;i<256;i++){
      var x=(i*2/255)-1;
      curve[i]=(Math.PI+amount)*x/(Math.PI+amount*Math.abs(x));
    }
    var shaper=ctx.createWaveShaper();
    shaper.curve=curve;
    shaper.oversample='4x';
    return shaper;
  }

  function makeBarkBuffer(ctx, dur){
    var sr=ctx.sampleRate;
    var len=Math.floor(sr*dur);
    var buf=ctx.createBuffer(1,len,sr);
    var d=buf.getChannelData(0);
    // shaped noise: fast attack, natural bark decay
    for(var i=0;i<len;i++){
      var t=i/len;
      var env;
      if(t<0.04)      env=t/0.04;                          // sharp attack
      else if(t<0.15) env=1.0;                              // hold
      else            env=Math.pow(1-(t-0.15)/0.85, 2.2);  // tail
      d[i]=(Math.random()*2-1)*env;
    }
    return buf;
  }

  function playRockDog(){
    var ctx=getCtx(); if(!ctx) return;
    try{
      var now=ctx.currentTime;
      var master=ctx.createGain();
      master.gain.value=0.92;
      master.connect(ctx.destination);

      // ── 1. BARK BODY (noise shaped like a woof) ──────────
      // Two bandpass layers mimic dog vocal formants
      var barkBuf=makeBarkBuffer(ctx,0.22);

      [[520,3.5,0.75],[1150,2.0,0.5],[2200,1.2,0.25]].forEach(function(f){
        var src=ctx.createBufferSource();
        src.buffer=barkBuf;
        var bp=ctx.createBiquadFilter();
        bp.type='bandpass'; bp.frequency.value=f[0]; bp.Q.value=f[1];
        var g=ctx.createGain();
        g.gain.setValueAtTime(f[2],now);
        g.gain.exponentialRampToValueAtTime(0.001,now+0.22);
        src.connect(bp); bp.connect(g); g.connect(master);
        src.start(now); src.stop(now+0.23);
      });

      // ── 2. BARK PITCH TONE (the "woof" fundamental ~220Hz) ─
      var barkOsc=ctx.createOscillator();
      barkOsc.type='sine';
      barkOsc.frequency.setValueAtTime(340,now);
      barkOsc.frequency.exponentialRampToValueAtTime(160,now+0.18);
      var boGain=ctx.createGain();
      boGain.gain.setValueAtTime(0.0,now);
      boGain.gain.linearRampToValueAtTime(0.55,now+0.025);
      boGain.gain.exponentialRampToValueAtTime(0.001,now+0.22);
      barkOsc.connect(boGain); boGain.connect(master);
      barkOsc.start(now); barkOsc.stop(now+0.23);

      // ── 3. DISTORTED GUITAR CHORD (starts with bark) ─────
      // E power chord: E2-B2-E3-B3 – fused to the bark attack
      var chordNotes=[82.4, 123.5, 164.8, 246.9];
      chordNotes.forEach(function(freq,i){
        var osc=ctx.createOscillator();
        osc.type='sawtooth';
        osc.frequency.value=freq;

        // Heavy distortion
        var dist=makeDistortion(ctx,600);

        // Low-pass to tame harshness
        var lp=ctx.createBiquadFilter();
        lp.type='lowpass'; lp.frequency.value=2200; lp.Q.value=0.8;

        // Mid presence boost to cut through bark
        var mid=ctx.createBiquadFilter();
        mid.type='peaking'; mid.frequency.value=900;
        mid.Q.value=1.5; mid.gain.value=6;

        var g=ctx.createGain();
        var t0=now+i*0.012;  // strum sweep
        g.gain.setValueAtTime(0.001,t0);
        g.gain.linearRampToValueAtTime(0.22,t0+0.010);
        g.gain.setValueAtTime(0.22,t0+0.010);
        g.gain.exponentialRampToValueAtTime(0.08,t0+0.22);
        g.gain.exponentialRampToValueAtTime(0.001,t0+0.60);

        osc.connect(dist); dist.connect(lp); lp.connect(mid); mid.connect(g); g.connect(master);
        osc.start(t0); osc.stop(t0+0.65);
      });

      // ── 4. BASS THUMP (body resonance of both bark+guitar) ─
      var bassOsc=ctx.createOscillator();
      bassOsc.type='sine';
      bassOsc.frequency.setValueAtTime(110,now);
      bassOsc.frequency.exponentialRampToValueAtTime(55,now+0.12);
      var bassG=ctx.createGain();
      bassG.gain.setValueAtTime(0.6,now);
      bassG.gain.exponentialRampToValueAtTime(0.001,now+0.15);
      bassOsc.connect(bassG); bassG.connect(master);
      bassOsc.start(now); bassOsc.stop(now+0.18);

      // ── 5. PICK TRANSIENT + BARK CONSONANT (the "W" of woof) ─
      var clickBuf=makeBarkBuffer(ctx,0.04);
      var csrc=ctx.createBufferSource();
      csrc.buffer=clickBuf;
      var chp=ctx.createBiquadFilter();
      chp.type='highpass'; chp.frequency.value=3000;
      var cg=ctx.createGain();
      cg.gain.setValueAtTime(0.9,now);
      cg.gain.exponentialRampToValueAtTime(0.001,now+0.04);
      csrc.connect(chp); chp.connect(cg); cg.connect(master);
      csrc.start(now); csrc.stop(now+0.05);

    }catch(e){}
  }

  // ── Helpers ────────────────────────────────────────────
  function toFlag(c){
    if(!c||c.length!==2)return '🌍';
    c=c.toUpperCase();
    return String.fromCodePoint(0x1F1E6+c.charCodeAt(0)-65)+
           String.fromCodePoint(0x1F1E6+c.charCodeAt(1)-65);
  }

  function saveLB(){try{localStorage.setItem(LB_KEY,JSON.stringify(lb));}catch(e){}}

  function renderLB(){
    var entries=Object.entries(lb).sort(function(a,b){return b[1].n-a[1].n;}).slice(0,8);
    if(!entries.length){
      lbRows.innerHTML='<div style="padding:10px 16px;font-size:0.72rem;color:#333;letter-spacing:1px">Start rocking to fill the board! 🎸</div>';
      return;
    }
    var max=entries[0][1].n||1;
    lbRows.innerHTML=entries.map(function(e,i){
      var pct=Math.round((e[1].n/max)*100);
      var medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
      return '<div class="lb-row">'+
        '<span class="lb-rank">'+medal+(i>2?i+1:'')+'</span>'+
        '<span class="lb-flag">'+e[1].flag+'</span>'+
        '<span class="lb-cname">'+e[1].name+'</span>'+
        '<div class="lb-bar-wrap"><div class="lb-bar" style="width:'+pct+'%"></div></div>'+
        '<span class="lb-num">'+e[1].n.toLocaleString()+'</span>'+
      '</div>';
    }).join('');
  }

  function renderBadgePops(){
    var c=lb[cCode];
    bPops.textContent=(c?c.n:0)+' pops';
  }

  // ── API ────────────────────────────────────────────────
  function fetchGlobal(){
    fetch('https://api.countapi.xyz/get/'+NS+'/global')
      .then(function(r){return r.json();})
      .then(function(d){if(d.value!=null){globalCount=d.value;globalEl.textContent=globalCount.toLocaleString();}})
      .catch(function(){globalEl.textContent='🤘';});
  }
  function hitGlobal(){
    fetch('https://api.countapi.xyz/hit/'+NS+'/global')
      .then(function(r){return r.json();})
      .then(function(d){if(d.value!=null){globalCount=d.value;globalEl.textContent=globalCount.toLocaleString();}})
      .catch(function(){globalCount++;globalEl.textContent=globalCount.toLocaleString();});
  }
  function hitCountry(code){
    fetch('https://api.countapi.xyz/hit/'+NS+'/'+code.toLowerCase()).catch(function(){});
  }

  fetchGlobal();

  // ── Country ────────────────────────────────────────────
  fetch('https://ipapi.co/json/')
    .then(function(r){return r.json();})
    .then(function(d){
      cName=d.country_name||'Unknown';
      cCode=d.country_code||'XX';
      cFlag=toFlag(cCode);
      bFlag.textContent=cFlag;
      bName.textContent=cName;
      renderBadgePops();
    })
    .catch(function(){bName.textContent='Unknown';});

  renderLB();

  // ── Particles ──────────────────────────────────────────
  var em=['🎸','⚡','🔥','💥','⭐','🤘','🎵','💀'];
  function spawnParticles(x,y){
    for(var i=0;i<7;i++){
      (function(){
        var p=document.createElement('div');
        p.className='particle';
        p.style.fontSize=(1+Math.random()*0.8)+'rem';
        p.textContent=em[Math.floor(Math.random()*em.length)];
        p.style.left=(x+(Math.random()*110-55))+'px';
        p.style.top=(y-10+(Math.random()*50-25))+'px';
        document.body.appendChild(p);
        setTimeout(function(){if(p.parentNode)p.parentNode.removeChild(p);},950);
      })();
    }
  }

  function spawnGuitarFloat(x,y){
    var g=document.createElement('div');
    g.className='guitar-float';
    g.textContent='🎸';
    g.style.left=(x-16)+'px'; g.style.top=(y-40)+'px';
    document.body.appendChild(g);
    setTimeout(function(){if(g.parentNode)g.parentNode.removeChild(g);},750);
  }

  function spawnRipple(){
    var r=document.createElement('div');
    r.className='ripple';
    dogWrap.appendChild(r);
    setTimeout(function(){if(r.parentNode)r.parentNode.removeChild(r);},650);
  }

  function addFeed(){
    var item=document.createElement('div');
    item.className='feed-item';
    var n=lb[cCode]?lb[cCode].n:myCount;
    item.innerHTML='<span>'+cFlag+'</span><span>'+cName+' rocked! <span class="glow">#'+n+'</span> 🎸</span>';
    if(feed.firstChild)feed.insertBefore(item,feed.firstChild);
    else feed.appendChild(item);
    while(feed.children.length>4)feed.removeChild(feed.lastChild);
    setTimeout(function(){if(item.parentNode)item.parentNode.removeChild(item);},3800);
  }

  function shakeScreen(){
    document.body.classList.add('shaking');
    setTimeout(function(){document.body.classList.remove('shaking');},200);
  }

  // ── Main pop ───────────────────────────────────────────
  function doPop(x,y){
    playRockDog();
    myCount++;
    myEl.textContent=myCount.toLocaleString();

    if(!lb[cCode])lb[cCode]={name:cName,flag:cFlag,n:0};
    lb[cCode].n++;
    saveLB(); renderLB(); renderBadgePops();

    hitGlobal();
    hitCountry(cCode);

    dogWrap.classList.add('popped');
    dogWrap.classList.add('mouth-open');
    dogWrap.classList.remove('bounce');
    void dogWrap.offsetWidth;
    dogWrap.classList.add('bounce');
    spawnRipple();
    shakeScreen();

    clearTimeout(popTmr);
    popTmr=setTimeout(function(){
      dogWrap.classList.remove('popped');
      dogWrap.classList.remove('mouth-open');
    },220);

    spawnParticles(x,y);
    spawnGuitarFloat(x,y);
    if(myCount%3===0)addFeed();
  }

  dogWrap.addEventListener('click',function(e){
    e.preventDefault();
    var r=dogWrap.getBoundingClientRect();
    doPop(r.left+r.width/2, r.top+r.height/2);
  });

  document.addEventListener('keydown',function(e){
    if(e.code==='Space'||e.key===' '){
      e.preventDefault();
      var r=dogWrap.getBoundingClientRect();
      doPop(r.left+r.width/2, r.top+r.height/2);
    }
  });
})();
</script>
</body>
